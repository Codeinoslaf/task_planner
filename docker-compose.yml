services:


  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - ./adaptive_tasks/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      collectstatic:
        condition: service_completed_successfully
    command: gunicorn adaptive_tasks.wsgi:application --bind 0.0.0.0:8080
    volumes:
      - static_volume:/app/adaptive_tasks/staticfiles
    networks:
      - my_net


  db:
    image: postgres:16
    env_file:
      - ./adaptive_tasks/.env
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_net


  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    depends_on:
      app:
        condition: service_started
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/adaptive_tasks/staticfiles
    networks:
      - my_net


  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - ./adaptive_tasks/.env
    command: python manage.py migrate --noinput
    depends_on:
      db:
        condition: service_healthy
    networks:
      - my_net


  collectstatic:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - ./adaptive_tasks/.env
    command: python manage.py collectstatic --noinput
    volumes:
      - static_volume:/app/adaptive_tasks/staticfiles
    networks:
      - my_net

volumes:
  static_volume:
  postgres_data:

networks:
  my_net:
    driver: bridge
