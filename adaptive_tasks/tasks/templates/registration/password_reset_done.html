{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письмо отправлено — Task Planner</title>
    <link rel="stylesheet" href="{% static 'tasks/css/base.css' %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');
        .auth-wrapper {
            min-height: calc(100vh - 73px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.25);
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
            animation: fadeUp 0.5s ease both;
            text-align: center;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-card__icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: block;
            animation: bounce 1s ease 0.5s both;
        }
        @keyframes bounce {
            0%   { transform: scale(0.5); opacity: 0; }
            70%  { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .auth-card__title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-card__text {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.7;
            margin: 0 0 32px;
        }
        .auth-card__text strong {
            color: #e2e8f0;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .divider {
            margin: 20px 0;
            font-size: 12px;
            color: #475569;
        }
        .secondary-btn {
            display: block;
            text-align: center;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }
        .secondary-btn:hover { color: #a78bfa; }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="top-nav__logo">✨ Task Planner</div>
    <div class="top-nav__links">
        <a href="{% url 'login' %}">🔑 Войти</a>
    </div>
</nav>
<main class="page-wrapper">
    <div class="auth-wrapper">
        <div class="auth-card">
            <span class="auth-card__icon">📬</span>
            <h1 class="auth-card__title">Письмо отправлено!</h1>
            <p class="auth-card__text">
                Мы отправили инструкцию по сбросу пароля на ваш email.<br><br>
                <strong>Не получили письмо?</strong> Проверьте папку «Спам» или убедитесь, что указали правильный адрес.
            </p>
            <a href="{% url 'login' %}" class="btn auth-btn"><span>Вернуться к входу</span></a>
            <div class="divider">или</div>
            <a href="{% url 'password_reset' %}" class="secondary-btn">Отправить письмо ещё раз</a>
        </div>
    </div>
</main>
</body>
</html>
