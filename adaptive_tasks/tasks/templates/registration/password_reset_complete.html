{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пароль изменён — Task Planner</title>
    <script>
        (function () {
            try {
                if (localStorage.getItem('taskPlannerTheme') === 'light') {
                    document.documentElement.classList.add('theme-light');
                }
            } catch (e) {}
        }());
    </script>
    <link rel="stylesheet" href="{% static 'tasks/css/base.css' %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');
        .auth-wrapper {
            min-height: calc(100vh - 73px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.25);
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
            animation: fadeUp 0.5s ease both;
            text-align: center;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-card__icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: block;
            animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        }
        @keyframes pop {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .auth-card__title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px;
            background: linear-gradient(135deg, #34d399, #10b981, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-card__text {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.7;
            margin: 0 0 32px;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        /* Зелёная обводка карточки для успеха */
        .auth-card {
            border-color: rgba(52, 211, 153, 0.25);
        }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="top-nav__logo">✨ Task Planner</div>
    <div class="top-nav__links">
        <a href="{% url 'login' %}">🔑 Войти</a>
        <button class="theme-toggle" id="theme-toggle" type="button" title="Переключить тему" aria-label="Переключить тему">
            <span class="theme-toggle__icon" id="theme-toggle-icon">☀️</span>
        </button>
    </div>
</nav>
<main class="page-wrapper">
    <div class="auth-wrapper">
        <div class="auth-card">
            <span class="auth-card__icon">✅</span>
            <h1 class="auth-card__title">Пароль изменён!</h1>
            <p class="auth-card__text">
                Ваш пароль успешно обновлён.<br>Теперь можете войти с новым паролем.
            </p>
            <a href="{% url 'login' %}" class="btn auth-btn"><span>Войти в аккаунт</span></a>
        </div>
    </div>
</main>
<script src="{% static 'tasks/js/theme.js' %}"></script>
</body>
</html>
